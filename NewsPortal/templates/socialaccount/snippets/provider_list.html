{% load socialaccount %}

{% get_providers as socialaccount_providers %}

{% for provider in socialaccount_providers %}
    {% if provider.id == "openid" %}
        {% for brand in provider.get_brands %}
            <a title="{{brand.name}}" class="btn-social socialaccount_provider {{provider.id}} {{brand.id}}" href="{% provider_login_url provider.id openid=brand.openid_url process=process %}">
                Войти через {{brand.name}}
            </a>
        {% endfor %}
    {% else %}
        <a title="{{provider.name}}" class="btn-social socialaccount_provider {{provider.id}}" href="{% provider_login_url provider.id process=process %}">
            Войти через {{provider.name}}
        </a>
    {% endif %}
{% endfor %}
