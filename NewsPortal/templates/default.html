<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}News Portal{% endblock title %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #fcfcfc;
            --text-color: #1a1a1a;
            --text-muted: #707070;
            --border-color: #e5e5e5;
            --accent-color: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        header {
            padding: 60px 0 30px 0;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.5px;
        }

        header h1 a {
            color: var(--text-color);
            text-decoration: none;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        main {
            flex: 1;
            padding: 40px 0;
        }

        footer {
            padding: 40px 0;
            border-top: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 300;
        }


        a {
            color: var(--text-muted);
            transition: color 0.2s ease;
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
        }

        a:hover {
            color: var(--accent-color);
        }
    </style>
</head>
<body>

    <header>
        <div class="container navbar">
            <h1><a href="/news/">News Portal</a></h1>
            <nav class="nav-links">
                <a href="/news/">Все публикации</a>
                <a href="/news/search/">Поиск</a>
                {% if user.is_authenticated %}
                    <a href="/news/profile/">Личный кабинет</a>
                {% else %}
                    <a href="/accounts/login/">Войти</a>
                    <a href="/accounts/signup/">Регистрация</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            {% block content %}
            {% endblock content %}
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026</p>
        </div>
    </footer>

</body>
</html>
